name: SOL — Tareas recurrentes por Telegram

on:
  schedule:
    # 9:00 AM hora Costa Rica (UTC-6) = 15:00 UTC
    # Lunes–Sábado (domingo se omite, tienda cerrada)
    - cron: '0 15 * * 1-6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send recurrentes
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send_recurrentes.mjs

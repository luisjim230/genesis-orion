name: SOL — Reporte diario por Telegram

on:
  schedule:
    # 8:00 AM hora Costa Rica (UTC-6) = 14:00 UTC
    # Lunes–Sábado (domingo se omite, tienda cerrada)
    - cron: '0 14 * * 1-6'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Fecha a reportar (YYYY-MM-DD). Vacío = día anterior (lunes usa sábado).'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Install DejaVu fonts (Unicode support para ₡)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Send daily report
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE:         ${{ github.event.inputs.report_date }}
        run: node scripts/send_daily_report.mjs

name: Refresh All Views

on:
  schedule:
    # 5am Costa Rica = 11:00 UTC (después del sync diario de NEO en la Mac).
    # Se corre 1 vez al día y fuera de horario laboral a propósito: el refresh de
    # mv_items_por_vend_mes es pesado (~200s sobre 776k filas) y, si corriera en
    # horario de trabajo, dejaría lenta a toda la app mientras dura.
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Refresh profecias_panel + mv_consumo_mensual + mv_items_por_vend_mes + bi_resumen_producto
        id: refresh
        run: |
          set -e
          SUPABASE_URL="https://xeeieqjqmtoiutfnltqu.supabase.co"
          # Usa SUPABASE_SERVICE_KEY (el secret canonico ya configurado y usado
          # por otros workflows, ej. telegram-daily-report). El secret antiguo
          # SUPABASE_SERVICE_ROLE_KEY quedo desactualizado y devolvia 401.
          AUTH="${{ secrets.SUPABASE_SERVICE_KEY }}"
          fallidas=0
          detalle=""

          # Refresca una vista con reintentos. Las vistas pesadas hacen TRUNCATE o
          # REFRESH MATERIALIZED VIEW (toman locks); si justo en ese instante la
          # sync de NEO o un lector tienen tomada la tabla, Postgres cancela la
          # operación por timeout (lock/statement) y PostgREST devuelve HTTP 5xx.
          # Eso es transitorio e inofensivo: el dato sigue consistente y al
          # reintentar unos segundos después suele pasar. Solo se cuenta como
          # falla real (y dispara alerta de Telegram) si sigue fallando tras
          # agotar los reintentos.
          refrescar() {
            local rpc=$1
            local intentos=4 espera=15 i=1 response body status
            while [ "$i" -le "$intentos" ]; do
              echo "→ $rpc (intento $i/$intentos)"
              response=$(curl -sS --max-time 600 -w '\n%{http_code}' -X POST \
                "$SUPABASE_URL/rest/v1/rpc/$rpc" \
                -H "apikey: $AUTH" \
                -H "Authorization: Bearer $AUTH" \
                -H "Content-Type: application/json" \
                -d '{}') || true
              body=$(echo "$response" | head -n -1)
              status=$(echo "$response" | tail -n 1)
              echo "  HTTP $status  $body"
              if [ "$status" = "200" ] || [ "$status" = "204" ]; then
                return 0
              fi
              # ¿Error transitorio? (statement/lock timeout, deadlock,
              # serialización, demasiadas conexiones, o cualquier 5xx/sin código).
              if echo "$body" | grep -qiE '57014|55P03|40P01|40001|53300|lock timeout|statement timeout|deadlock|canceling statement' \
                 || [ -z "$status" ] || [ "${status:0:1}" = "5" ]; then
                echo "  ↻ error transitorio; reintento en ${espera}s"
                sleep "$espera"; espera=$((espera*2)); i=$((i+1)); continue
              fi
              # Error no transitorio (4xx, error de SQL real): no tiene sentido reintentar.
              break
            done
            echo "  ❌ $rpc falló (HTTP ${status}) tras ${i} intento(s)"
            fallidas=$((fallidas+1))
            detalle="${detalle} ${rpc}(HTTP ${status})"
            return 0
          }

          refrescar refresh_profecias_panel
          refrescar refresh_mv_consumo_mensual
          refrescar refresh_mv_items_por_vend_mes
          refrescar bi_recalcular_resumen

          echo ""
          echo "detalle=${detalle}" >> "$GITHUB_OUTPUT"
          if [ "$fallidas" -gt 0 ]; then
            echo "Refresh terminó con $fallidas fallas:${detalle}"
            exit 1
          fi
          echo "Todas las vistas refrescadas OK"

      # Si el refresh falló (cualquier vista o un error inesperado del job),
      # avisar por Telegram para saber que las existencias / datos derivados
      # quedaron desactualizados.
      - name: Avisar por Telegram si falló
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DET="${{ steps.refresh.outputs.detalle }}"
          MSG="⚠️ SOL — el refresh diario de vistas FALLÓ.${DET:+ Vistas con error:${DET}.} Las existencias del módulo Origen y los datos derivados pueden quedar desactualizados. Revisá la corrida en GitHub Actions → Refresh All Views."
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true" || true
